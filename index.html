<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carrousel Gâteaux">
<meta name="theme-color" content="#3a1259">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<title>Carrousel des Gâteaux</title>
<style>
  :root{
    --bg1:#3a1259; --bg2:#1b0830; --gold:#ffd35c; --gold2:#ff9d2e;
    --pink:#ff5fa2;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
  html,body{margin:0; height:100%; overflow:hidden;}
  /* le fond couvre tout l'écran (barre d'état en haut + indicateur en bas) */
  html{ background:radial-gradient(120% 90% at 50% 0%, var(--bg1), var(--bg2)) var(--bg2) no-repeat; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:transparent;
    color:#fff; height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    touch-action:manipulation;
  }
  body::before{
    content:""; position:fixed; inset:-30% -10% auto -10%; height:70%;
    background:radial-gradient(closest-side, rgba(255,211,92,.16), transparent 70%);
    animation:float 6s ease-in-out infinite; pointer-events:none;
  }
  @keyframes float{50%{transform:translateY(20px) scale(1.1);}}

  header{padding:20px 0 4px; text-align:center;}
  .title{
    font-size:27px; font-weight:900; letter-spacing:.5px; line-height:1.05;
    background:linear-gradient(180deg,#fff,#ffd9ec);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{font-size:11px; color:#ffc7e3; letter-spacing:3px; margin-top:6px; font-weight:700;}

  /* le carrousel (horizontal) */
  .stage{position:relative; width:100%; flex:0 0 auto; margin:8px 0;}
  .pointer{
    position:absolute; left:50%; top:-6px; transform:translateX(-50%); z-index:6;
    width:0; height:0; border-left:13px solid transparent; border-right:13px solid transparent;
    border-top:18px solid var(--gold);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));
  }
  .pointer.bottom{top:auto; bottom:-6px; border-top:none; border-bottom:18px solid var(--gold);}
  .track-wrap{
    position:relative; width:100%; height:168px; overflow:hidden;
    background:linear-gradient(180deg,#2a0f3f,#3a1556);
    border-top:3px solid rgba(255,211,92,.7); border-bottom:3px solid rgba(255,211,92,.7);
    box-shadow:inset 0 8px 22px rgba(0,0,0,.55);
  }
  /* dégradés sur les bords pour l'effet "fenêtre" */
  .track-wrap::before,.track-wrap::after{
    content:""; position:absolute; top:0; bottom:0; width:70px; z-index:4; pointer-events:none;
  }
  .track-wrap::before{left:0;  background:linear-gradient(90deg,#23103a,transparent);}
  .track-wrap::after{right:0; background:linear-gradient(270deg,#23103a,transparent);}
  .center-band{
    position:absolute; left:50%; top:0; bottom:0; width:120px; transform:translateX(-50%);
    z-index:3; pointer-events:none;
    box-shadow:inset 0 0 0 3px rgba(255,95,162,.55);
    border-radius:14px;
  }
  .track{position:absolute; top:0; left:0; display:flex; height:100%; will-change:transform;}
  .cake-card{
    width:120px; height:100%; flex:0 0 120px;
    display:flex; align-items:center; justify-content:center;
    font-size:74px;
  }

  /* bouton */
  .controls{display:flex; flex-direction:column; align-items:center; gap:10px; padding:6px 0 18px;}
  .spin{
    appearance:none; border:none; cursor:pointer;
    font-size:22px; font-weight:900; letter-spacing:1px; color:#5a1200;
    padding:18px 54px; border-radius:40px;
    background:linear-gradient(180deg,var(--gold),var(--gold2));
    box-shadow:0 10px 0 #b85d00, 0 16px 26px rgba(0,0,0,.4);
    transition:transform .06s, box-shadow .06s;
  }
  .spin:active{transform:translateY(7px); box-shadow:0 3px 0 #b85d00, 0 6px 14px rgba(0,0,0,.4);}
  .spin:disabled{filter:saturate(.5) brightness(.9);}
  .hint{font-size:13px; color:#ffd9ec; font-weight:600;}

  /* écran du gagnant */
  .reveal{
    position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px;
    background:rgba(15,4,32,.78); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .35s;
  }
  .reveal.show{opacity:1; pointer-events:auto;}
  .reveal-won{
    font-size:24px; font-weight:900; letter-spacing:2px;
    background:linear-gradient(180deg,#fff,var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .prize{
    font-size:170px; line-height:1; cursor:grab; touch-action:none;
    transform:scale(.3); transition:transform .45s cubic-bezier(.2,1.5,.4,1);
    filter:drop-shadow(0 16px 24px rgba(0,0,0,.55));
  }
  .reveal.show .prize{transform:scale(1);}
  .prize:active{cursor:grabbing;}
  .prize.dragging{transition:none;}
  .prize-name{font-size:20px; font-weight:800; color:#ffd9ec;}
  .pull-hint{font-size:13px; color:#ffb3da; font-weight:600; opacity:.9;}
  .again{
    appearance:none; border:2px solid rgba(255,255,255,.5); cursor:pointer;
    background:rgba(255,255,255,.12); color:#fff; font-weight:800; font-size:16px;
    padding:12px 32px; border-radius:30px; margin-top:4px;
  }
  .again:active{transform:scale(.96);}

  .fx{position:fixed; width:74px; height:92px; z-index:60; background:transparent;}
  #zL{top:0; left:0;}
  #hN{
    position:fixed; top:3px; right:6px; z-index:70; pointer-events:none;
    font-size:11px; font-weight:800; line-height:1; opacity:0; transition:opacity .12s;
  }
  #hN.on{opacity:1;}

  /* confettis de victoire (au-dessus de l'écran gagnant) */
  .confetti{position:fixed; top:-44px; z-index:40; pointer-events:none; will-change:transform,opacity;}
</style>
</head>
<body>
  <header>
    <div class="title">🎠 CARROUSEL<br>DES GÂTEAUX</div>
    <div class="subtitle">M O N S I E U R&nbsp;&nbsp;S U C R E</div>
  </header>

  <div class="stage">
    <div class="pointer"></div>
    <div class="track-wrap">
      <div class="center-band"></div>
      <div class="track" id="track"></div>
    </div>
    <div class="pointer bottom"></div>
  </div>

  <div class="controls">
    <button class="spin" id="spin">TOURNER</button>
    <div class="hint">Le carrousel s'arrête sur un gâteau 🎂</div>
  </div>

  <!-- écran gagnant -->
  <div class="reveal" id="reveal">
    <div class="prize" id="prize">🍩</div>
    <div class="prize-name" id="prizeName">Donut chocolat</div>
    <div class="pull-hint">✋ Tire le gâteau pour le sortir de l'écran</div>
    <button class="again" id="again">RECOMMENCER</button>
  </div>

  <div class="fx" id="zL"></div>
  <div id="hN"></div>

<script>
(function(){
  const CAKES = ["🍩","🧁","🍰","🎂","🥐","🍪","🍮","🥧","🍫","🍬","🍭","🍡","🥮","🧇","🥞","🍦","🍨","🍧"];
  const NAMES = {
    "🍩":"Donut chocolat","🧁":"Cupcake","🍰":"Part de gâteau","🎂":"Gâteau",
    "🥐":"Croissant","🍪":"Cookie","🍮":"Flan","🥧":"Tarte",
    "🍫":"Chocolat","🍬":"Bonbon","🍭":"Sucette","🍡":"Dango","🥮":"Mooncake",
    "🧇":"Gaufre","🥞":"Pancakes","🍦":"Glace","🍨":"Coupe glacée","🍧":"Granité"
  };

  const DONUT = "🍩";
  let rigged = false;   
  let spinning = false;

  const track = document.getElementById('track');
  const wrap = track.parentElement;
  const spinBtn = document.getElementById('spin');
  const reveal = document.getElementById('reveal');
  const prize = document.getElementById('prize');
  const prizeName = document.getElementById('prizeName');
  const hN = document.getElementById('hN');
  const CARD = 120;

  function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p); }

  // ---- audio (fanfare de victoire, synthétisée -> aucun fichier) ----
  let audioCtx = null;
  function unlockAudio(){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === 'suspended') audioCtx.resume();
    }catch(e){}
  }
  function beep(freq, start, dur, vol, type){
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'triangle';
    o.frequency.value = freq;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.exponentialRampToValueAtTime(vol, start + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.start(start); o.stop(start + dur + 0.02);
  }
  function playVictory(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime + 0.02;
    // petite montée joyeuse : Do - Mi - Sol - Do aigu
    const melody = [[523.25,0.00],[659.25,0.12],[783.99,0.24],[1046.50,0.40]];
    melody.forEach(([f,dt])=> beep(f, t+dt, 0.18, 0.22, 'triangle'));
    // accord final tenu + petites étincelles aiguës
    beep(1046.50, t+0.56, 0.5, 0.20, 'triangle');
    beep(1318.51, t+0.56, 0.5, 0.12, 'triangle');
    beep(1567.98, t+0.66, 0.35, 0.10, 'sine');
    beep(2093.00, t+0.74, 0.30, 0.07, 'sine');
    // petite basse pour le corps
    beep(130.81, t+0.40, 0.4, 0.18, 'sine');
  }

  // un "tic" sec quand une carte passe sous le repère
  function tick(when){
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = 1100;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(0.10, when + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.045);
    o.start(when); o.stop(when + 0.06);
  }
  // programme un tic à chaque case franchie (de plus en plus espacés -> ralentit avec la roue)
  function scheduleTicks(totalDist, durationMs){
    if(!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const N = Math.floor(totalDist / CARD);
    for(let k=1;k<=N;k++){
      const fr = (k*CARD)/totalDist;
      if(fr >= 1) break;
      // inverse de l'easing easeOutExpo -> instant où la case franchit le centre
      const tt = -Math.log(1-fr)/(10*Math.LN2);
      tick(t0 + tt*(durationMs/1000));
    }
  }

  // pluie de confettis (gâteaux + étoiles)
  function rainConfetti(){
    const pieces = ["🎉","⭐️","🍫","✨","🧁","🍬","🍭"];
    for(let i=0;i<22;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = pieces[Math.floor(Math.random()*pieces.length)];
      c.style.left = (Math.random()*100) + 'vw';
      c.style.fontSize = (18 + Math.random()*18) + 'px';
      const dur = 1600 + Math.random()*1700;
      c.style.transition = 'transform '+dur+'ms linear, opacity '+dur+'ms ease-in';
      document.body.appendChild(c);
      requestAnimationFrame(()=>{
        c.style.transform = 'translateY(115vh) rotate('+(Math.random()*720-360)+'deg)';
        c.style.opacity = '0';
      });
      setTimeout(()=>c.remove(), dur+120);
    }
  }

  function rfH(){
    if(rigged){ hN.textContent = DONUT; hN.classList.add('on'); }
    else { hN.classList.remove('on'); hN.textContent=''; }
  }

  function pick(){ return CAKES[Math.floor(Math.random()*CAKES.length)]; }
  function pickNonDonut(){ let s; do { s = pick(); } while(s===DONUT); return s; }

  function buildTrack(winIndex, winSym){
    const N = winIndex + 8;
    track.innerHTML = '';
    let p1 = null, p2 = null;   // les deux cartes précédentes
    for(let i=0;i<N;i++){
      let sym;
      if(i===winIndex){
        sym = winSym;
      } else {
        // jamais la même icône dans 3 cases d'affilée, jamais le gagnant ailleurs,
        // et en mode libre le donut n'apparaît pas du tout
        do { sym = pick(); }
        while(sym===p1 || sym===p2 || sym===winSym || (!rigged && sym===DONUT));
      }
      const c = document.createElement('div');
      c.className = 'cake-card';
      c.textContent = sym;
      track.appendChild(c);
      p2 = p1; p1 = sym;
    }
  }

  function doSpin(){
    if(spinning) return;
    spinning = true; spinBtn.disabled = true;

    const winSym = rigged ? DONUT : pickNonDonut();
    const winIndex = 34 + Math.floor(Math.random()*5);
    buildTrack(winIndex, winSym);

    const wrapW = wrap.clientWidth;
    const target = wrapW/2 - winIndex*CARD - CARD/2;   // arrêt pile au centre du repère

    // le hasard est sur la DURÉE (et la distance via winIndex), pas sur la position finale
    const duration = 9000 + Math.floor(Math.random()*2500);

    track.style.transition = 'none';
    track.style.transform = 'translateX(0px)';
    void track.offsetHeight;
    // une seule décélération continue (easeOutExpo) : aucun regain de vitesse à la fin
    track.style.transition = 'transform '+duration+'ms cubic-bezier(0.16, 1, 0.3, 1)';
    track.style.transform = 'translateX('+target+'px)';
    vibrate(8);
    scheduleTicks(Math.abs(target), duration);   // bruits de défilement (ralentissent avec la roue)

    setTimeout(()=>{
      showPrize(winSym);
      spinning = false; spinBtn.disabled = false;
    }, duration + 80);
  }

  function showPrize(sym){
    prize.textContent = sym;
    prize.style.transform = '';      
    prize.style.opacity = '1';
    prizeName.textContent = NAMES[sym] || '';
    reveal.classList.add('show');
    if(sym === DONUT){
      vibrate([0,40,40,40,40,40,40,40,40,40,60,40,60,40,80,60,150]);
      rainConfetti(); playVictory();
    } else {
      vibrate([0,25,50,25]);
    }
  }

  document.getElementById('again').addEventListener('click', ()=>{
    reveal.classList.remove('show');
    prize.style.transform=''; prize.style.opacity='1';
  });
  spinBtn.addEventListener('click', ()=>{ unlockAudio(); doSpin(); });
  // filet de sécurité : débloque aussi l'audio au tout premier contact
  window.addEventListener('touchstart', unlockAudio, {once:true});

  let drag = null;
  function onDown(e){
    e.preventDefault();
    const p = e.touches ? e.touches[0] : e;
    drag = {x0:p.clientX, y0:p.clientY, dx:0, dy:0};
    prize.classList.add('dragging');
  }
  function onMove(e){
    if(!drag) return;
    e.preventDefault();
    const p = e.touches ? e.touches[0] : e;
    drag.dx = p.clientX - drag.x0;
    drag.dy = p.clientY - drag.y0;
    const dist = Math.hypot(drag.dx, drag.dy);
    const grow = 1 + Math.min(dist/240, 0.85);   // grossit progressivement jusqu'à ~1.85x
    const rot = Math.max(-25, Math.min(25, drag.dx*0.06));
    prize.style.transform = 'translate('+drag.dx+'px,'+drag.dy+'px) rotate('+rot+'deg) scale('+grow.toFixed(3)+')';
  }
  function onUp(){
    if(!drag) return;
    prize.classList.remove('dragging');
    const dist = Math.hypot(drag.dx, drag.dy);
    if(dist > 110){
      const len = dist || 1;
      const ux = drag.dx/len, uy = drag.dy/len;
      const far = (window.innerWidth + window.innerHeight);
      const fx = ux*far, fy = uy*far;
      const rot = Math.max(-90, Math.min(90, drag.dx*0.2));
      prize.style.transition = 'transform .55s cubic-bezier(.4,0,.7,1), opacity .55s ease-in';
      prize.style.transform = 'translate('+fx+'px,'+fy+'px) rotate('+rot+'deg) scale(1.9)';
      prize.style.opacity = '0';
      vibrate([0,15,30,15,30,40]);
      setTimeout(()=>{ prize.style.transition=''; }, 600);
    } else {
      prize.style.transition = 'transform .3s cubic-bezier(.2,1.4,.4,1)';
      prize.style.transform = '';
      setTimeout(()=>{ prize.style.transition=''; }, 320);
    }
    drag = null;
  }
  prize.addEventListener('touchstart', onDown, {passive:false});
  prize.addEventListener('touchmove', onMove, {passive:false});
  prize.addEventListener('touchend', onUp);
  prize.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);

  const zL = document.getElementById('zL');
  function rgL(e){
    e.preventDefault();
    rigged = !rigged;
    vibrate(rigged ? 18 : [0,40]);
    rfH();
  }
  zL.addEventListener('touchstart', rgL, {passive:false});
  zL.addEventListener('mousedown', rgL);

  document.addEventListener('gesturestart', e=>e.preventDefault());
  document.addEventListener('touchmove', e=>{ if(e.touches.length>1) e.preventDefault(); }, {passive:false});

  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }

  buildTrack(36, "🎂");   // affichage au repos (mode libre) : pas de donut
  track.style.transform = 'translateX('+(wrap.clientWidth/2 - 2*CARD - CARD/2)+'px)';
})();
</script>
</body>
</html>
